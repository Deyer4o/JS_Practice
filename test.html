<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Playground Showcase</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>
    <a href="index.html">← back</a>
    <h1>HTML / CSS / JS Example Showcase</h1>

    <div class="examples">

        <!-- Example 1 -->
        <div class="playground">
            <div class="playground-header">
                <h2>Example 1: HTML + CSS + JS</h2>
                <div class="controls">
                    <label><input type="checkbox" class="toggle-html" checked> HTML</label>
                    <label><input type="checkbox" class="toggle-css" checked> CSS</label>
                    <label><input type="checkbox" class="toggle-js" checked> JavaScript</label>
                    <label><input type="checkbox" class="toggle-auto" checked> Auto update</label>
                    <button class="run-btn">Run</button>
                </div>
            </div>

            <div class="playground-body">
                <div class="editors">
                    <div class="editor-group html-group">
                        <h3>HTML</h3>
                        <textarea class="html-code"><h1>Hello!</h1>
<p id="paragraph">This is the first example.</p>
<div id="paragraphList"></div>
<button onclick="multiplyParagraph(5)">Click me</button></textarea>
                    </div>

                    <div class="editor-group css-group">
                        <h3>CSS</h3>
                        <textarea class="css-code">body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

h1 {
    color: crimson;
}

#paragraph-1 {
    color:red;
}
</textarea>
                    </div>

                    <div class="editor-group js-group">
                        <h3>JavaScript</h3>
                        <textarea class="js-code">function sayHi() {
    alert("Hello from Example 1!");
}

function multiplyParagraph(n){
    // ToDo:
    // 1 - DONE - find desired paragraph
    // 2 - DONE -  add "n" number of new paragraphs under it and include their "i" serial number
    // 3 - DONE -  give them id-s "paragraph-i" (using "i")
    // 4 - DONE -  use CSS to pain the 2nd element in red

    var originalParagraph = document.getElementById("paragraph").innerHTML;

    for (let i = 0; i < n; i++) {
        newText = i + " - " + originalParagraph;

        const newParagraph = document.createElement("p");
        newParagraph.textContent = newText;
        newParagraph.id = "paragraph-" + i;
        
        paragraphList = document.getElementById("paragraphList");
        paragraphList.appendChild(newParagraph);
    }
}</textarea>
                    </div>
                </div>

                <div class="preview-area">
                    <iframe class="preview"></iframe>
                </div>
            </div>
        </div>

        <!-- Example 2 -->
        <div class="playground">
            <div class="playground-header">
                <h2>Example 2: Only HTML + CSS</h2>
                <div class="controls">
                    <label><input type="checkbox" class="toggle-html" checked> HTML</label>
                    <label><input type="checkbox" class="toggle-css" checked> CSS</label>
                    <label><input type="checkbox" class="toggle-js"> JavaScript</label>
                    <label><input type="checkbox" class="toggle-auto" checked> Auto update</label>
                    <button class="run-btn">Run</button>
                </div>
            </div>

            <div class="playground-body">
                <div class="editors">
                    <div class="editor-group html-group">
                        <h3>HTML</h3>
                        <textarea class="html-code"><div class="card">
    <h2>Simple Card</h2>
    <p>This example uses only HTML and CSS.</p>
</div></textarea>
                    </div>

                    <div class="editor-group css-group">
                        <h3>CSS</h3>
                        <textarea class="css-code">body {
    padding: 20px;
    background: #f0f7ff;
    font-family: Arial, sans-serif;
}

.card {
    padding: 20px;
    border-radius: 12px;
    background: white;
    border: 2px solid #99c2ff;
}</textarea>
                    </div>

                    <div class="editor-group js-group hidden">
                        <h3>JavaScript</h3>
                        <textarea class="js-code"></textarea>
                    </div>
                </div>

                <div class="preview-area">
                    <iframe class="preview"></iframe>
                </div>
            </div>
        </div>

    </div>

    <script src="test.js"></script>
</body>
</html>
