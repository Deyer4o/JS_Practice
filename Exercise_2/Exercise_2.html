<!DOCTYPE html>
<html>
<head>
    <title>Exercise_1</title>
    <link rel='stylesheet' href='Exercise_2.css'>
</head>
<body>
    <a href="../index.html">← back</a>
    <div class="main" style="height: 10vh; justify-content: flex-start; align-items: flex-start;" >
        <div class="box" id="box" style="
        margin: 1vh; 
        padding: 1vh; 
        font-size: x-small; 
        flex: 0 0 60px;
        height: 60px;
        width: 60px;">
            <p id="key">-</p>
            <p id="code">-</p>
        </div>
        
    </div>
    <div class="main" style="height: 80vh;">
        <div class="row">
            <div class="box selected" id="button-1" data-function="say-hi">
                <p>Say Hi</p>
            </div>
            <div class="box" id="button-2" data-function="say-bye">
                <p>Say Bye</p>
            </div>
        </div>
        <div class="row">
            <div class="box" style="visibility: hidden;"></div>
            <div class="box" id="button-3" data-function="light-theme">
                <p>light theme</p>
            </div>
            <div class="box" id="button-4" data-function="dark-theme">
                <p>dark theme</p>
            </div>
            <div class="box" id="button-5" data-function="nothing">
                <p>do nothing</p>
            </div>
        </div>
    </div>
    
    <script src='Exercise_2.js'></script>
</body>
</html>
